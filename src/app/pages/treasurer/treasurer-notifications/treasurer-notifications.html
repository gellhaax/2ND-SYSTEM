<app-navbar></app-navbar>

<div class="treasurer-page">
  <div class="page">

    <h1 class="title">MY NOTIFICATIONS</h1>

    <div class="notification-list">

      <div
        class="notif-card"
        *ngFor="let n of notifications"
        [class.unread]="!n.isRead"
        (click)="markAsRead(n)"
      >
        <div class="notif-icon">
          {{ n.message.startsWith('✅') ? '✅' : '❌' }}
        </div>

        <div class="notif-body">
          <p class="notif-message">{{ n.message }}</p>
          <span class="notif-date">📅 {{ n.date }}</span>
        </div>

        <div class="notif-badge" *ngIf="!n.isRead">NEW</div>
      </div>

      <div class="empty-box" *ngIf="notifications.length === 0">
        🔔 No notifications yet.
      </div>

    </div>

  </div>
</div>
